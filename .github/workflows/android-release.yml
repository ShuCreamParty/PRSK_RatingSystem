name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Prepare signing files (optional)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        shell: bash
        run: |
          if [[ -n "$ANDROID_KEYSTORE_BASE64" ]]; then
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > app/release.keystore
            cat <<EOF > keystore.properties
            storeFile=app/release.keystore
            storePassword=$ANDROID_KEYSTORE_PASSWORD
            keyAlias=$ANDROID_KEY_ALIAS
            keyPassword=$ANDROID_KEY_PASSWORD
            EOF
            echo "Release keystore configured."
          else
            echo "No release keystore secret found. Falling back to debug signing."
          fi

      - name: Ensure gradlew is executable
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Locate APK
        id: locate_apk
        shell: bash
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -maxdepth 1 -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Release APK not found."
            exit 1
          fi
          cp "$APK_PATH" app-release.apk
          echo "apk_path=app-release.apk" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: ${{ steps.locate_apk.outputs.apk_path }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.locate_apk.outputs.apk_path }}
          generate_release_notes: true
